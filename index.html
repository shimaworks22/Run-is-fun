<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Running Mates - 一緒に走る仲間を見つける</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #EFEDE4;
    font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }
  input, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

const COLORS = {
  bg: "#F6F4EF",
  card: "#FFFFFF",
  ink: "#1F2A26",
  inkSoft: "#5C6B65",
  line: "#E4E0D6",
  mint: "#1C8F6E",
  mintSoft: "#E3F3EC",
  mintDeep: "#0F5B45",
  ember: "#E8743B",
  amber: "#D9A012",
};

const LEVELS = {
  beginner: { label: "初級", color: "#1C8F6E", bg: "#E3F3EC" },
  intermediate: { label: "中級", color: "#D9A012", bg: "#FBF1DA" },
  advanced: { label: "上級", color: "#E8743B", bg: "#FCE7DA" },
};

const initialEvents = [
  {
    id: 1,
    title: "皇居ラン・朝活5km",
    place: "皇居外周（桜田門スタート）",
    date: "6/20(土) 7:00",
    level: "beginner",
    minPeople: 4,
    capacity: 12,
    joined: 3,
    distance: "5km",
    pace: "6:30/km目安",
    host: "ゆうき",
    note: "ゆっくり気持ちよく走るのが目的です。初めての方も歓迎！終わったらコーヒー飲みに行きます。",
  },
  {
    id: 2,
    title: "多摩川ロング走 15km",
    place: "多摩川サイクリングロード（二子玉川）",
    date: "6/21(日) 6:30",
    level: "advanced",
    minPeople: 3,
    capacity: 8,
    joined: 4,
    distance: "15km",
    pace: "4:30/km目安",
    host: "たくみ",
    note: "フルマラソンに向けたペース走です。サブ4目標の方向け。",
  },
  {
    id: 3,
    title: "夜ラン＆ストレッチ会",
    place: "代々木公園",
    date: "6/19(金) 19:30",
    level: "intermediate",
    minPeople: 5,
    capacity: 15,
    joined: 2,
    distance: "8km",
    pace: "5:30/km目安",
    host: "みさき",
    note: "走った後に簡単なストレッチタイムもあります。仕事終わりにリフレッシュしましょう。",
  },
];

function Icon({ name, size = 16, color = "currentColor" }) {
  const paths = {
    clock: <><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></>,
    pin: <><path d="M12 21s-7-6.5-7-11a7 7 0 1 1 14 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></>,
    users: <><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.5 3-6 7-6s7 2.5 7 6"/><circle cx="17" cy="9" r="2.5"/><path d="M16 14c2.8.3 5 2.4 5 5"/></>,
    plus: <><path d="M12 5v14M5 12h14"/></>,
    back: <><path d="M15 19l-7-7 7-7"/></>,
    check: <><path d="M5 13l4 4L19 7"/></>,
    flame: <><path d="M12 2c2 3-1 4-1 7 0 2 1.5 3 3 3 2 0 3-1.5 3-3.5C19 13 17 21 12 21c-5 0-7-4-7-7 0-3 2-4 3-7 0 2 1 3 2 3 1 0 2-1 2-2.5C12 5 11 3 12 2z"/></>,
    gauge: <><path d="M12 14l3-3"/><circle cx="12" cy="14" r="1.5"/><path d="M4 14a8 8 0 1 1 16 0"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
}

function LevelBadge({ level }) {
  const l = LEVELS[level];
  return (
    <span style={{ fontSize: 12, fontWeight: 600, color: l.color, background: l.bg, padding: "3px 10px", borderRadius: 999, whiteSpace: "nowrap" }}>
      {l.label}
    </span>
  );
}

function ProgressBar({ joined, min, capacity }) {
  const pct = Math.min(100, Math.round((joined / capacity) * 100));
  const minPct = Math.min(100, Math.round((min / capacity) * 100));
  const reached = joined >= min;
  return (
    <div style={{ width: "100%" }}>
      <div style={{ position: "relative", height: 8, borderRadius: 999, background: COLORS.line, overflow: "hidden" }}>
        <div style={{ position: "absolute", top: 0, left: 0, height: "100%", width: pct + "%", background: reached ? COLORS.mint : COLORS.amber, transition: "width 0.3s ease" }} />
        <div style={{ position: "absolute", top: -2, left: minPct + "%", width: 2, height: 12, background: COLORS.ink, opacity: 0.35 }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 12, color: COLORS.inkSoft }}>
        <span style={{ color: reached ? COLORS.mintDeep : COLORS.inkSoft, fontWeight: reached ? 600 : 400 }}>
          {reached ? (
            <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}>
              <Icon name="check" size={13} /> 開催ライン到達（{joined}人）
            </span>
          ) : (
            "あと" + (min - joined) + "人で開催ライン"
          )}
        </span>
        <span>{joined}/{capacity}人</span>
      </div>
    </div>
  );
}

function Row({ iconName, text }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, color: COLORS.inkSoft, fontSize: 13 }}>
      <span style={{ color: COLORS.mintDeep, display: "flex" }}><Icon name={iconName} size={14} /></span>
      {text}
    </div>
  );
}

function ListScreen({ events, onSelect, onCreate }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ padding: "20px 20px 12px" }}>
        <p style={{ fontSize: 13, color: COLORS.inkSoft, margin: 0, letterSpacing: 0.5 }}>RUNNING MATES</p>
        <h1 style={{ fontSize: 24, fontWeight: 700, margin: "4px 0 0", color: COLORS.ink }}>一緒に走る仲間を見つける</h1>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "4px 16px 90px" }}>
        {events.map((ev) => (
          <button key={ev.id} onClick={() => onSelect(ev)} style={{ display: "block", width: "100%", textAlign: "left", background: COLORS.card, border: "1px solid " + COLORS.line, borderRadius: 16, padding: 16, marginBottom: 12, cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0, color: COLORS.ink, lineHeight: 1.4 }}>{ev.title}</h3>
              <LevelBadge level={ev.level} />
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 10 }}>
              <Row iconName="clock" text={ev.date} />
              <Row iconName="pin" text={ev.place} />
            </div>
            <div style={{ marginTop: 14 }}>
              <ProgressBar joined={ev.joined} min={ev.minPeople} capacity={ev.capacity} />
            </div>
          </button>
        ))}
      </div>
      <button onClick={onCreate} style={{ position: "absolute", right: 20, bottom: 24, width: 56, height: 56, borderRadius: "50%", background: COLORS.ember, color: "#fff", border: "none", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 6px 16px rgba(232,116,59,0.4)", cursor: "pointer" }} aria-label="募集を作成">
        <Icon name="plus" size={26} color="#fff" />
      </button>
    </div>
  );
}

function InfoCard({ iconName, label, value }) {
  return (
    <div style={{ background: COLORS.card, border: "1px solid " + COLORS.line, borderRadius: 14, padding: "12px 14px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, color: COLORS.mintDeep }}>
        <Icon name={iconName} size={16} />
        <span style={{ fontSize: 12, color: COLORS.inkSoft }}>{label}</span>
      </div>
      <p style={{ fontSize: 14, fontWeight: 600, color: COLORS.ink, margin: "6px 0 0" }}>{value}</p>
    </div>
  );
}

function DetailScreen({ event, onBack, onJoin, joinedState }) {
  const isJoined = joinedState[event.id];
  const joined = event.joined + (isJoined ? 1 : 0);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ padding: "16px 16px 0" }}>
        <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "none", color: COLORS.inkSoft, fontSize: 14, cursor: "pointer", padding: "4px 0" }}>
          <Icon name="back" size={18} /> 一覧へ戻る
        </button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "8px 20px 100px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
          <h1 style={{ fontSize: 21, fontWeight: 700, color: COLORS.ink, margin: 0, lineHeight: 1.4 }}>{event.title}</h1>
          <LevelBadge level={event.level} />
        </div>
        <p style={{ fontSize: 13, color: COLORS.inkSoft, marginTop: 6 }}>主催: {event.host}</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 18 }}>
          <InfoCard iconName="clock" label="日時" value={event.date} />
          <InfoCard iconName="pin" label="場所" value={event.place} />
          <InfoCard iconName="flame" label="距離" value={event.distance} />
          <InfoCard iconName="gauge" label="ペース目安" value={event.pace} />
        </div>
        <div style={{ marginTop: 20, background: COLORS.card, border: "1px solid " + COLORS.line, borderRadius: 16, padding: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
            <Icon name="users" size={15} color={COLORS.mintDeep} />
            <span style={{ fontSize: 13, fontWeight: 600, color: COLORS.ink }}>参加状況</span>
          </div>
          <ProgressBar joined={joined} min={event.minPeople} capacity={event.capacity} />
          <p style={{ fontSize: 12, color: COLORS.inkSoft, marginTop: 10, marginBottom: 0 }}>
            最小遂行人数は{event.minPeople}人です。達していなくても主催者の判断で開催される場合があります。
          </p>
        </div>
        <div style={{ marginTop: 20 }}>
          <h3 style={{ fontSize: 14, fontWeight: 600, color: COLORS.ink, marginBottom: 8 }}>主催者からのメッセージ</h3>
          <p style={{ fontSize: 14, color: COLORS.inkSoft, lineHeight: 1.7, margin: 0 }}>{event.note}</p>
        </div>
      </div>
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 0, padding: "14px 20px 20px", background: "linear-gradient(to top, #F6F4EF 60%, rgba(246,244,239,0))" }}>
        <button onClick={() => onJoin(event.id)} disabled={isJoined} style={{ width: "100%", padding: "14px 0", borderRadius: 14, border: "none", fontSize: 15, fontWeight: 700, cursor: isJoined ? "default" : "pointer", background: isJoined ? COLORS.mintSoft : COLORS.mint, color: isJoined ? COLORS.mintDeep : "#fff", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
          {isJoined ? (<><Icon name="check" size={18} color={COLORS.mintDeep} /> 参加表明済み</>) : "ワンタップで参加する"}
        </button>
      </div>
    </div>
  );
}

const inputStyle = { width: "100%", padding: "11px 12px", borderRadius: 12, border: "1px solid " + COLORS.line, fontSize: 14, color: COLORS.ink, boxSizing: "border-box", outline: "none" };

function Field({ label, children, style }) {
  return (
    <div style={{ marginBottom: 16, ...style }}>
      <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: COLORS.ink, marginBottom: 6 }}>{label}</label>
      {children}
    </div>
  );
}

function StepBtn({ children, onClick }) {
  return (
    <button onClick={onClick} style={{ width: 40, height: 40, border: "none", background: COLORS.mintSoft, color: COLORS.mintDeep, fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
      {children}
    </button>
  );
}

function NumberStepper({ value, onChange }) {
  return (
    <div style={{ display: "flex", alignItems: "center", border: "1px solid " + COLORS.line, borderRadius: 12, overflow: "hidden" }}>
      <StepBtn onClick={() => onChange(value - 1)}>−</StepBtn>
      <div style={{ flex: 1, textAlign: "center", fontWeight: 700, color: COLORS.ink }}>{value}</div>
      <StepBtn onClick={() => onChange(value + 1)}>＋</StepBtn>
    </div>
  );
}

function CreateScreen({ onBack, onSubmit }) {
  const [form, setForm] = useState({ title: "", place: "", date: "", minPeople: 3, capacity: 10, level: "beginner", note: "" });
  const update = (key, value) => setForm((f) => ({ ...f, [key]: value }));
  const canSubmit = form.title.trim() && form.place.trim() && form.date.trim();

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ padding: "16px 16px 0" }}>
        <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "none", color: COLORS.inkSoft, fontSize: 14, cursor: "pointer", padding: "4px 0" }}>
          <Icon name="back" size={18} /> 戻る
        </button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "8px 20px 100px" }}>
        <h1 style={{ fontSize: 21, fontWeight: 700, color: COLORS.ink, margin: "4px 0 18px" }}>募集を作成する</h1>
        <Field label="タイトル">
          <input value={form.title} onChange={(e) => update("title", e.target.value)} placeholder="例：朝活5kmゆるラン" style={inputStyle} />
        </Field>
        <Field label="日時">
          <input value={form.date} onChange={(e) => update("date", e.target.value)} placeholder="例：6/22(月) 7:00" style={inputStyle} />
        </Field>
        <Field label="場所">
          <input value={form.place} onChange={(e) => update("place", e.target.value)} placeholder="例：皇居外周（桜田門スタート）" style={inputStyle} />
        </Field>
        <Field label="レベル">
          <div style={{ display: "flex", gap: 8 }}>
            {Object.entries(LEVELS).map(([key, l]) => (
              <button key={key} onClick={() => update("level", key)} style={{ flex: 1, padding: "10px 0", borderRadius: 12, border: form.level === key ? "1.5px solid " + l.color : "1px solid " + COLORS.line, background: form.level === key ? l.bg : COLORS.card, color: form.level === key ? l.color : COLORS.inkSoft, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                {l.label}
              </button>
            ))}
          </div>
        </Field>
        <div style={{ display: "flex", gap: 12 }}>
          <Field label="最小遂行人数" style={{ flex: 1 }}>
            <NumberStepper value={form.minPeople} onChange={(v) => update("minPeople", Math.max(1, v))} />
          </Field>
          <Field label="募集上限" style={{ flex: 1 }}>
            <NumberStepper value={form.capacity} onChange={(v) => update("capacity", Math.max(form.minPeople, v))} />
          </Field>
        </div>
        <Field label="主催者からのメッセージ（任意）">
          <textarea value={form.note} onChange={(e) => update("note", e.target.value)} placeholder="ペースや雰囲気、当日の流れなど" rows={3} style={{ ...inputStyle, resize: "none", fontFamily: "inherit" }} />
        </Field>
      </div>
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 0, padding: "14px 20px 20px", background: "linear-gradient(to top, #F6F4EF 60%, rgba(246,244,239,0))" }}>
        <button onClick={() => canSubmit && onSubmit(form)} disabled={!canSubmit} style={{ width: "100%", padding: "14px 0", borderRadius: 14, border: "none", fontSize: 15, fontWeight: 700, cursor: canSubmit ? "pointer" : "default", background: canSubmit ? COLORS.ember : COLORS.line, color: canSubmit ? "#fff" : COLORS.inkSoft }}>
          募集を公開する
        </button>
      </div>
    </div>
  );
}

function App() {
  const [events, setEvents] = useState(initialEvents);
  const [screen, setScreen] = useState("list");
  const [selectedId, setSelectedId] = useState(null);
  const [joinedState, setJoinedState] = useState({});

  const selectedEvent = useMemo(() => events.find((e) => e.id === selectedId) || null, [events, selectedId]);

  const handleJoin = (id) => setJoinedState((s) => ({ ...s, [id]: true }));

  const handleCreate = (form) => {
    const newEvent = {
      id: Date.now(),
      title: form.title,
      place: form.place,
      date: form.date,
      level: form.level,
      minPeople: Number(form.minPeople),
      capacity: Number(form.capacity),
      joined: 0,
      distance: "—",
      pace: "—",
      host: "あなた",
      note: form.note || "よろしくお願いします！",
    };
    setEvents((evs) => [newEvent, ...evs]);
    setScreen("list");
  };

  return (
    <div style={{ width: "100%", minHeight: "100vh", background: "#EFEDE4", display: "flex", justifyContent: "center", alignItems: "center", padding: "24px 0" }}>
      <div style={{ width: "min(390px, 100vw)", height: "min(760px, 100vh)", background: COLORS.bg, borderRadius: 0, overflow: "hidden", position: "relative", boxShadow: "0 20px 50px rgba(0,0,0,0.18)" }}>
        {screen === "list" && (
          <ListScreen
            events={events.map((e) => ({ ...e, joined: e.joined + (joinedState[e.id] ? 1 : 0) }))}
            onSelect={(ev) => { setSelectedId(ev.id); setScreen("detail"); }}
            onCreate={() => setScreen("create")}
          />
        )}
        {screen === "detail" && selectedEvent && (
          <DetailScreen event={selectedEvent} onBack={() => setScreen("list")} onJoin={handleJoin} joinedState={joinedState} />
        )}
        {screen === "create" && (
          <CreateScreen onBack={() => setScreen("list")} onSubmit={handleCreate} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
